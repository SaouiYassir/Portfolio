    <style>#loader { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #ffffff; transition: opacity 0.6s ease, visibility 0.6s ease; } body.dark-mode #loader { background: #121212; } #loader.hidden { opacity: 0; visibility: hidden; } .loader-name { font-family: 'Roboto Mono', monospace; font-size: 16px; letter-spacing: 0.15em; color: #3B82F6; margin: 0 0 18px; } .bar-track { width: 180px; height: 2px; background: rgba(59,130,246,0.15); border-radius: 2px; overflow: hidden; } .bar-fill { height: 100%; background: #3B82F6; animation: barSweep 1.8s ease-in-out infinite; } @keyframes barSweep { 0% { width: 0%; margin-left: 0%; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0%; margin-left: 100%; } } .loader-sub { font-family: 'Roboto Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: #6B7280; margin-top: 16px; animation: blink 1.4s ease-in-out infinite; } @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }</style>
  </head>

    <div id="root"></div>
